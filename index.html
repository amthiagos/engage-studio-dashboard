<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engage Studio · SEO Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --brand-bg:      #f9e9d7;
    --brand-primary: #ebc7bc;
    --brand-border:  #f3c8bf;
    --brand-text:    #383838;
    --brand-dark:    #2a2020;
    --brand-header:  #383838;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--brand-bg);
    color: var(--brand-text);
    margin: 0; padding: 0;
  }
  /* Header */
  .site-header {
    background: var(--brand-header);
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--brand-primary);
  }
  .site-header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.04em; margin: 0; }
  .site-header .updated { font-size: 0.75rem; opacity: 0.75; }

  /* Cards */
  .stat-card {
    background: #fff;
    border: 1px solid var(--brand-border);
    border-radius: 8px;
    padding: 14px 18px;
    min-width: 130px;
  }
  .stat-card .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.6; }
  .stat-card .value { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
  .stat-card .sub   { font-size: 0.7rem; opacity: 0.55; margin-top: 2px; }

  /* Tier label rows */
  .tier-header {
    background: var(--brand-primary);
    color: var(--brand-text);
    font-weight: 700;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-top: 1px solid var(--brand-border);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  .tier-header:hover { background: #dab0a5; }
  .tier-header .tier-count {
    font-weight: 400;
    opacity: 0.7;
    font-size: 0.68rem;
  }
  .tier-header .tier-ranked-badge {
    margin-left: auto;
    background: rgba(26,107,42,0.15);
    color: #1a6b2a;
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 0.66rem;
    font-weight: 600;
  }
  .tier-header .chevron {
    transition: transform 0.2s;
    font-size: 0.65rem;
    opacity: 0.6;
  }
  .tier-header.collapsed .chevron,
  .tier-header-row.collapsed .chevron { transform: rotate(-90deg); }
  .tier-header-row { cursor: pointer; }

  /* Table */
  .kw-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  .kw-table th {
    background: var(--brand-header);
    color: #fff;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    padding: 7px 10px;
    text-align: left;
    white-space: nowrap;
    border-right: 1px solid #4a3838;
    position: sticky;
    top: 0;
    z-index: 3;
  }
  .kw-table th:last-child { border-right: none; }
  .kw-table td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--brand-border);
    vertical-align: middle;
    white-space: nowrap;
  }
  .kw-table tr:nth-child(even) td { background: rgba(235,199,188,0.12); }
  .kw-table tr:hover td { background: rgba(235,199,188,0.3); cursor: pointer; }
  .kw-table .kw-name {
    font-weight: 500;
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .kw-table .kw-name.ranked { color: #1a6b2a; font-weight: 600; }
  .kw-table .kw-name.gap     { opacity: 0.55; font-style: italic; }

  /* Position badges */
  .pos-badge {
    display: inline-block;
    font-weight: 700;
    font-size: 0.78rem;
    min-width: 28px;
    text-align: center;
    border-radius: 4px;
    padding: 1px 5px;
  }
  .pos-1-3   { background: #d4edda; color: #155724; }
  .pos-4-10  { background: #d4edda; color: #1a6b2a; }
  .pos-11-20 { background: #fff3cd; color: #856404; }
  .pos-21-50 { background: #ffe0cc; color: #a04010; }
  .pos-51    { background: #f0f0f0; color: #666; }
  .pos-none  { color: #999; font-weight: 400; }

  /* Delta badges */
  .delta {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    font-weight: 600;
    font-size: 0.72rem;
    border-radius: 4px;
    padding: 1px 6px;
  }
  .delta-improved { background: #d4edda; color: #155724; }
  .delta-dropped  { background: #f8d7da; color: #721c24; }
  .delta-new      { background: #cce5ff; color: #004085; }
  .delta-lost     { background: #fff3cd; color: #856404; }
  .delta-none     { color: #bbb; font-weight: 400; }

  /* Status badges */
  .status-ranked   { background: #d4edda; color: #155724; border-radius: 10px; padding: 1px 8px; font-size: 0.65rem; font-weight: 600; }
  .status-tracking { background: #f0f0f0; color: #666;    border-radius: 10px; padding: 1px 8px; font-size: 0.65rem; }
  .status-gap      { background: #e8f4fd; color: #004085; border-radius: 10px; padding: 1px 8px; font-size: 0.65rem; border: 1px solid #bee5eb; }

  /* Tabs */
  .tab-bar {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    padding: 10px 16px 0;
  }
  .tab {
    padding: 6px 14px;
    border-radius: 6px 6px 0 0;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
    background: rgba(235,199,188,0.25);
    color: var(--brand-text);
    transition: all 0.15s;
  }
  .tab:hover { background: var(--brand-primary); }
  .tab.active {
    background: #fff;
    border-color: var(--brand-border);
    font-weight: 700;
    color: var(--brand-text);
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid var(--brand-border);
    border-top: 1px solid var(--brand-border);
    flex-wrap: wrap;
  }
  .controls label { font-size: 0.72rem; font-weight: 600; opacity: 0.65; }
  .controls select {
    font-size: 0.78rem;
    padding: 4px 8px;
    border: 1px solid var(--brand-border);
    border-radius: 5px;
    background: var(--brand-bg);
    color: var(--brand-text);
    cursor: pointer;
  }
  .controls select:focus { outline: 2px solid var(--brand-primary); }
  .controls .sep { opacity: 0.3; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(40,30,30,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 12px;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-header {
    background: var(--brand-header);
    color: #fff;
    padding: 16px 20px;
    border-radius: 12px 12px 0 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .modal-header h2 { margin: 0; font-size: 1rem; font-weight: 600; line-height: 1.4; }
  .modal-header .meta { font-size: 0.72rem; opacity: 0.7; margin-top: 3px; }
  .modal-close {
    background: none;
    border: none;
    color: #fff;
    font-size: 1.4rem;
    cursor: pointer;
    opacity: 0.7;
    line-height: 1;
    padding: 0;
    flex-shrink: 0;
  }
  .modal-close:hover { opacity: 1; }
  .modal-body { padding: 20px; }
  .modal-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .modal-stat { font-size: 0.78rem; }
  .modal-stat .ms-label { opacity: 0.55; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .modal-stat .ms-value { font-weight: 700; font-size: 1rem; }
  .chart-container { position: relative; height: 240px; margin-bottom: 16px; }
  .history-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.75rem;
    margin-top: 12px;
  }
  .history-table th {
    text-align: left;
    padding: 5px 8px;
    background: var(--brand-bg);
    border-bottom: 2px solid var(--brand-border);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .history-table td {
    padding: 5px 8px;
    border-bottom: 1px solid var(--brand-border);
  }
  .no-data { text-align: center; padding: 40px; opacity: 0.5; font-size: 0.85rem; }

  /* Responsive */
  @media (max-width: 640px) {
    .hide-mobile { display: none !important; }
    .kw-table .kw-name { max-width: 160px; }
    .stat-card .value { font-size: 1.2rem; }
  }
  @media (max-width: 900px) {
    .hide-tablet { display: none !important; }
  }
</style>
</head>

// ── App state ──────────────────────────────────────────────────────────────
const DATES = Object.keys(SNAPSHOTS).sort().reverse(); // newest first
let state = {
  currentDate: DATES[0] || null,
  compareDate: DATES[1] || null,
  tier: 'all',
  chart: null,
};

const TIER_ORDER = ['tier_1', 'tier_2', 'tier_3', 'tier_4', 'untagged'];

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtVol(v)  { return (v > 0) ? v.toLocaleString() : '—'; }
function fmtPos(p)  { return (p > 0) ? p : null; }
function slug(url)  { return (url || '').replace('https://www.engagestudio.com', '') || '/'; }

function posClass(p) {
  if (!p || p <= 0) return 'pos-none';
  if (p <= 3)  return 'pos-badge pos-1-3';
  if (p <= 10) return 'pos-badge pos-4-10';
  if (p <= 20) return 'pos-badge pos-11-20';
  if (p <= 50) return 'pos-badge pos-21-50';
  return 'pos-badge pos-51';
}

function allKws(snapshot) {
  if (!snapshot) return [];
  const out = [];
  for (const [tierKey, tier] of Object.entries(snapshot.tiers)) {
    for (const kw of tier.keywords) {
      out.push({ ...kw, tierKey, tierLabel: tier.label });
    }
  }
  return out;
}

function findKw(snapshot, keyword) {
  if (!snapshot) return null;
  for (const tier of Object.values(snapshot.tiers)) {
    const found = tier.keywords.find(k => k.keyword === keyword);
    if (found) return found;
  }
  return null;
}

function kwHistory(keyword) {
  return DATES.map(date => ({
    date,
    data: findKw(SNAPSHOTS[date], keyword),
  })).reverse(); // oldest first for chart
}

// ── WoW delta calculation ──────────────────────────────────────────────────
function computeDelta(keyword, currDate, cmpDate) {
  if (!cmpDate) return null;
  const curr = findKw(SNAPSHOTS[currDate], keyword);
  const prev = findKw(SNAPSHOTS[cmpDate], keyword);
  if (!curr || !prev) return null;

  const cp = curr.position_ca || 0;
  const pp = prev.position_ca || 0;

  if (cp === 0 && pp === 0) return null;
  if (cp === 0 && pp > 0)   return { type: 'lost',     val: null };
  if (cp > 0  && pp === 0)  return { type: 'new',      val: null };
  const diff = pp - cp; // positive = moved up (better)
  if (diff > 0) return { type: 'improved', val: diff };
  if (diff < 0) return { type: 'dropped',  val: Math.abs(diff) };
  return { type: 'unchanged', val: 0 };
}

function deltaHtml(d) {
  if (!d) return '<span class="delta-none">—</span>';
  if (d.type === 'improved') return `<span class="delta delta-improved">↑${d.val}</span>`;
  if (d.type === 'dropped')  return `<span class="delta delta-dropped">↓${d.val}</span>`;
  if (d.type === 'new')      return `<span class="delta delta-new">NEW</span>`;
  if (d.type === 'lost')     return `<span class="delta delta-lost">LOST</span>`;
  return '<span class="delta-none">—</span>';
}

// ── Stats computation ──────────────────────────────────────────────────────
function computeStats() {
  const snap  = SNAPSHOTS[state.currentDate];
  const kws   = allKws(snap);
  const total = kws.length;
  const ranked = kws.filter(k => k.position_ca > 0).length;
  let improved = 0, dropped = 0, gained = 0;

  if (state.compareDate) {
    for (const kw of kws) {
      const d = computeDelta(kw.keyword, state.currentDate, state.compareDate);
      if (!d) continue;
      if (d.type === 'improved') improved++;
      if (d.type === 'dropped')  dropped++;
      if (d.type === 'new')      gained++;
    }
  }
  return { total, ranked, improved, dropped, gained };
}

// ── Render stats bar ───────────────────────────────────────────────────────
function renderStats() {
  const snap = SNAPSHOTS[state.currentDate];
  const d = snap ? snap.generated_at : '—';
  const displayDate = d !== '—' ? new Date(d).toLocaleDateString('en-CA', { month:'long', day:'numeric', year:'numeric', timeZone:'UTC' }) : '—';
  document.getElementById('last-updated').textContent = `Updated: ${displayDate}`;

  const s = computeStats();
  setCard('stat-total',    s.total,    'keywords');
  setCard('stat-ranked',   s.ranked,   'in top 100 CA');
  setCard('stat-improved', s.improved, 'WoW ↑');
  setCard('stat-dropped',  s.dropped,  'WoW ↓');

  const newCard = document.getElementById('stat-new');
  if (s.gained > 0) {
    newCard.style.display = '';
    setCard('stat-new', s.gained, 'newly ranked');
  } else {
    newCard.style.display = 'none';
  }
}

function setCard(id, val, sub) {
  const el = document.getElementById(id);
  el.querySelector('.value').textContent = val;
  el.querySelector('.sub').textContent   = sub;
}

// ── Render date selectors ──────────────────────────────────────────────────
function renderSelectors() {
  const curr = document.getElementById('sel-current');
  const cmp  = document.getElementById('sel-compare');
  curr.innerHTML = '';
  cmp.innerHTML  = '<option value="">No comparison</option>';

  DATES.forEach(d => {
    const label = new Date(d).toLocaleDateString('en-CA', { month:'short', day:'numeric', year:'numeric', timeZone:'UTC' });
    curr.innerHTML += `<option value="${d}" ${d === state.currentDate ? 'selected':''}>${label}</option>`;
    cmp.innerHTML  += `<option value="${d}" ${d === state.compareDate ? 'selected':''}>${label}</option>`;
  });

  // YoY badge — show if a snapshot ~52 weeks ago exists
  const snapDates = DATES.map(d => new Date(d).getTime());
  const oneYear   = 365 * 24 * 60 * 60 * 1000;
  const currTs    = new Date(state.currentDate).getTime();
  const hasYoY    = snapDates.some(ts => Math.abs(ts - (currTs - oneYear)) < 30 * 24 * 60 * 60 * 1000);
  document.getElementById('yoy-badge').style.display = hasYoY ? '' : 'none';
}

// ── Render tier table ──────────────────────────────────────────────────────
function renderTable() {
  const snap = SNAPSHOTS[state.currentDate];
  if (!snap) { document.getElementById('table-area').innerHTML = '<div class="no-data">No data available.</div>'; return; }

  const tiers = state.tier === 'all' ? TIER_ORDER : [state.tier];
  let html = '';

  html += `<table class="kw-table">
    <thead>
      <tr>
        <th style="min-width:200px">Keyword</th>
        <th class="hide-mobile">Vol CA/mo</th>
        <th>Pos CA</th>
        <th>Δ WoW</th>
        <th class="hide-tablet">Pos Global</th>
        <th class="hide-tablet">Preferred Page</th>
        <th class="hide-mobile">Status</th>
      </tr>
    </thead>`;

  for (const tierKey of tiers) {
    const tier = snap.tiers[tierKey];
    if (!tier) continue;

    const kws      = tier.keywords;
    const rankCnt  = kws.filter(k => k.position_ca > 0).length;
    const tierId   = `tier-body-${tierKey}`;

    // Each tier gets its own <tbody> (valid HTML, multiple per table) so the
    // collapse toggle still works — but it's all ONE <table>, sharing the
    // single <thead> above, so column widths stay aligned across tiers.
    html += `<tbody>
      <tr class="tier-header-row" onclick="toggleTier('${tierId}', this)">
        <td colspan="7" style="padding:0">
          <div class="tier-header">
            <span class="chevron">▼</span>
            ${tier.label}
            <span class="tier-count">(${kws.length} keywords)</span>
            <span class="tier-ranked-badge">${rankCnt} ranked</span>
          </div>
        </td>
      </tr>
    </tbody>
    <tbody id="${tierId}">`;

    for (const kw of kws) {
      const pos_ca  = fmtPos(kw.position_ca);
      const pos_gl  = fmtPos(kw.position_global);
      const vol     = fmtVol(kw.volume_ca);
      const delta   = computeDelta(kw.keyword, state.currentDate, state.compareDate);
      const dHtml   = deltaHtml(delta);
      const prefPg  = slug(kw.preferred_page);
      const isGap   = !kw.preferred_page;
      const kwClass = pos_ca ? 'kw-name ranked' : (isGap ? 'kw-name gap' : 'kw-name');

      const gscBadge = (pos_ca && kw.position_source === 'gsc')
        ? ' <sup title="From Google Search Console (Ahrefs found no position)" style="opacity:0.6">GSC</sup>'
        : '';
      const posHtml = pos_ca
        ? `<span class="${posClass(kw.position_ca)}">${pos_ca}</span>${gscBadge}`
        : `<span class="pos-none">—</span>`;
      const posGlHtml = pos_gl
        ? `<span class="${posClass(kw.position_gl)}" style="font-size:0.72rem">${pos_gl}</span>`
        : `<span class="pos-none">—</span>`;

      let status = 'status-tracking';
      let statusLabel = 'Tracking';
      if (pos_ca) { status = 'status-ranked'; statusLabel = 'Ranked'; }
      else if (isGap) { status = 'status-gap'; statusLabel = 'Gap'; }

      const mismatch = kw.page_mismatch ? ' title="⚠ Ranking URL ≠ Preferred Page"' : '';

      html += `<tr onclick="openModal('${kw.keyword.replace(/'/g,"\\'")}')">
        <td><span class="${kwClass}"${mismatch}>${kw.keyword}${kw.page_mismatch ? ' <small style="color:#e67e22">⚠</small>' : ''}</span></td>
        <td class="hide-mobile" style="text-align:right; font-variant-numeric:tabular-nums; opacity:0.7">${vol}</td>
        <td style="text-align:center">${posHtml}</td>
        <td style="text-align:center">${dHtml}</td>
        <td class="hide-tablet" style="text-align:center">${posGlHtml}</td>
        <td class="hide-tablet" style="font-size:0.7rem; opacity:0.65; max-width:200px; overflow:hidden; text-overflow:ellipsis">${prefPg}</td>
        <td class="hide-mobile"><span class="${status}">${statusLabel}</span></td>
      </tr>`;
    }

    html += '</tbody>';
  }

  html += '</table>';
  document.getElementById('table-area').innerHTML = html;
}

// ── Tier collapse toggle ───────────────────────────────────────────────────
function toggleTier(bodyId, headerEl) {
  const body = document.getElementById(bodyId);
  if (!body) return;
  const isHidden = body.style.display === 'none';
  body.style.display = isHidden ? '' : 'none';
  headerEl.classList.toggle('collapsed', !isHidden);
}

// ── Tab selection ──────────────────────────────────────────────────────────
function selectTier(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  state.tier = el.dataset.tier;
  renderTable();
}

// ── Date selector change ───────────────────────────────────────────────────
function onDateChange() {
  state.currentDate = document.getElementById('sel-current').value;
  state.compareDate = document.getElementById('sel-compare').value || null;
  renderStats();
  renderTable();
}

// ── Modal ──────────────────────────────────────────────────────────────────
let chartInst = null;

function openModal(keyword) {
  const snap = SNAPSHOTS[state.currentDate];
  const kw   = findKw(snap, keyword);
  if (!kw) return;

  document.getElementById('modal-kw-name').textContent = keyword;
  document.getElementById('modal-kw-meta').textContent =
    `${kw.tierLabel}  ·  ${fmtVol(kw.volume_ca)}/mo CA` +
    (kw.cpc_ca ? `  ·  CPC $${(kw.cpc_ca/100).toFixed(2)}` : '');

  const history = kwHistory(keyword);
  const ranked  = history.filter(h => h.data && h.data.position_ca > 0);
  const bestPos = ranked.length ? Math.min(...ranked.map(h => h.data.position_ca)) : null;
  const latest  = kw.position_ca || null;
  const delta   = computeDelta(keyword, state.currentDate, state.compareDate);

  // Stats
  let statsHtml = `
    <div class="modal-stat">
      <div class="ms-label">Current CA</div>
      <div class="ms-value">${latest ? `#${latest}` : '—'}</div>
    </div>
    <div class="modal-stat">
      <div class="ms-label">Global</div>
      <div class="ms-value">${kw.position_global ? `#${kw.position_global}` : '—'}</div>
    </div>
    <div class="modal-stat">
      <div class="ms-label">WoW</div>
      <div class="ms-value">${delta ? (delta.type==='improved'?`↑${delta.val}`:delta.type==='dropped'?`↓${delta.val}`:delta.type==='new'?'NEW':delta.type==='lost'?'LOST':'—') : '—'}</div>
    </div>
    <div class="modal-stat">
      <div class="ms-label">Best ever</div>
      <div class="ms-value">${bestPos ? `#${bestPos}` : '—'}</div>
    </div>
    <div class="modal-stat">
      <div class="ms-label">Weeks tracked</div>
      <div class="ms-value">${history.length}</div>
    </div>`;

  if (kw.preferred_page) {
    statsHtml += `<div class="modal-stat" style="flex-basis:100%">
      <div class="ms-label">Preferred page</div>
      <div class="ms-value" style="font-size:0.78rem">${slug(kw.preferred_page)}</div>
    </div>`;
  }
  if (kw.ranking_url && kw.page_mismatch) {
    statsHtml += `<div class="modal-stat" style="flex-basis:100%">
      <div class="ms-label" style="color:#e67e22">⚠ Ranking URL (mismatch)</div>
      <div class="ms-value" style="font-size:0.78rem; color:#e67e22">${slug(kw.ranking_url)}</div>
    </div>`;
  }
  document.getElementById('modal-stats').innerHTML = statsHtml;

  // Chart
  const chartDates    = history.map(h => h.date);
  const chartPositions = history.map(h => (h.data && h.data.position_ca > 0) ? h.data.position_ca : null);

  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('trendline-chart'), {
    type: 'line',
    data: {
      labels: chartDates.map(d => new Date(d).toLocaleDateString('en-CA', { month:'short', day:'numeric', timeZone:'UTC' })),
      datasets: [{
        label: 'Position CA',
        data: chartPositions,
        spanGaps: false,
        borderColor: '#383838',
        backgroundColor: 'rgba(235,199,188,0.35)',
        fill: true,
        tension: 0.35,
        pointBackgroundColor: '#ebc7bc',
        pointBorderColor: '#383838',
        pointBorderWidth: 2,
        pointRadius: 5,
        pointHoverRadius: 7,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          reverse: true,
          min: 1,
          suggestedMax: 50,
          ticks: {
            stepSize: 5,
            callback: v => `#${v}`,
            font: { size: 11 },
          },
          grid: { color: 'rgba(0,0,0,0.06)' },
          title: { display: true, text: 'Position (lower = better)', font: { size: 10 }, color: '#888' },
        },
        x: {
          ticks: { font: { size: 10 } },
          grid: { color: 'rgba(0,0,0,0.04)' },
        },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ctx.raw ? `Position #${ctx.raw}` : 'Not ranking',
          },
        },
      },
    },
  });

  // History table
  let histHtml = `
    <table class="history-table">
      <thead><tr>
        <th>Date</th>
        <th>Pos CA</th>
        <th>Pos Global</th>
        <th>Vol CA</th>
        <th>GSC Impr</th>
      </tr></thead>
      <tbody>`;
  [...history].reverse().forEach(h => {
    const d = h.data;
    histHtml += `<tr>
      <td>${new Date(h.date).toLocaleDateString('en-CA', { month:'short', day:'numeric', year:'numeric', timeZone:'UTC' })}</td>
      <td>${d && d.position_ca   ? `#${d.position_ca}`   : '—'}</td>
      <td>${d && d.position_global ? `#${d.position_global}` : '—'}</td>
      <td>${d ? fmtVol(d.volume_ca) : '—'}</td>
      <td>${d && d.gsc_impressions_6mo ? d.gsc_impressions_6mo.toLocaleString() : '—'}</td>
    </tr>`;
  });
  histHtml += '</tbody></table>';

  if (history.length <= 1) {
    histHtml = '<div style="text-align:center; padding:12px; opacity:0.5; font-size:0.78rem">Run keyword_map.py weekly to build your trendline history.</div>';
  }
  document.getElementById('modal-history').innerHTML = histHtml;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Keyboard support ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  if (!DATES.length) {
    document.getElementById('table-area').innerHTML = '<div class="no-data">No keyword snapshots found. Run keyword_map.py first.</div>';
    return;
  }
  renderSelectors();
  renderStats();
  renderTable();
}

init();
</script>
